<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Planetora</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

<style>
body, html { margin: 0; padding: 0; font-family: 'Roboto', sans-serif; background: #fff; }
.header { display: flex; flex-wrap: wrap; padding: 0; background: #fff; }
.title { padding: 0 20px; font-size: 40px; font-weight: bold; color: black; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
.card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 10px; }
.card { display: flex; flex-direction: column; flex: 1 1 350px; max-width: 900px; min-width: 250px; padding: 7px; border: 2px solid #F0F0F0; border-radius: 15px; background: white; color: #696969; cursor: default; transition: all 1s ease; }
.card:hover { border-color: white; color: black; box-shadow: 0 10px 50px rgba(0,0,0,0.4); z-index: 10; }
.card-title { font-size: 24px; color: #6e6e6e; margin-bottom: 10px; user-select: none; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; }
.roomgroup-container { display: flex; flex-wrap: wrap; gap: 5px; }
.roomgroups { display: flex; flex-direction: column; align-items: flex-start; gap: 0; }
button { outline: none; border-radius: 15px; flex-shrink: 1; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; transition: all 0.2s ease; }
.room-btn, .sroom-btn { padding: 6px; font-size: 18px; border: 2px solid white; }
.room-btn { background: #F4F4F4; color: #696969; cursor: pointer; }
.room-btn:hover { border-color: #696969; background: #696969; color: white; }
.room-btn:active { border-color: black; background: black; color: white; }
.room-btn.clicked { background: black; border-color: black; color: white; }
.sroom-btn { background: black; color: white; padding: 7px; cursor: pointer; }
.sroom-btn:hover { border-color: white; background: #474747; }
.sroom-btn:active { background: grey; }
.common-btn { padding: 27px; font-size: 20px; border: 2px solid #D3D3D3; background: white; color: #696969; cursor: pointer; transition: all 1s ease; }
.common-btn:hover { border-color: white; color: black; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
.common-btn:active { background: black; border-color: black; color: white; transition: all 0.1s ease; }
.common-btn.clicked { background: black; border-color: black; color: white; }
.button-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; padding: 0 10px 10px; background: #fff; }
.tooltip-container { position: relative; display: inline-block; }
.tooltip-text { visibility: hidden; opacity: 0; position: absolute; top: 45px; left: 0; width: 120px; padding: 8px; background: black; color: white; font-size: 14px; text-align: left; border-radius: 15px; box-shadow: 0 8px 16px rgba(2,2,2,.2); transition: opacity 0.3s; pointer-events: none; }
.tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }

</style>
</head>
<body>

<div class="header">
  <div class="title">
    <a id="title-link" href="index.html" style="text-decoration: none; color: inherit;">Planetora</a>
  </div>
</div>

<div class="card-container" style="padding: 0 10px;">
  <div class="card" id="room-selection-card">
    <div class="card-title">Select the rooms for making the floor plan</div>
    <div class="roomgroup-container">
      <!-- Room groups -->
      <div class="roomgroups">
        <button class="room-btn" data-limit="5">Garage</button>
        <button class="room-btn" data-limit="5">Parking</button>
        <button class="room-btn" data-limit="1">Foyer</button>
        <button class="room-btn" data-limit="1">Entryway</button>
        <button class="room-btn" data-limit="2">Living</button>
        <button class="room-btn" data-limit="1">Office</button>
        <button class="room-btn" data-limit="1">Study</button>
        <button class="room-btn" data-limit="1">Family Room</button>
      </div>
      <div class="roomgroups">
        <button class="room-btn" data-limit="2">Dining</button>
        <button class="room-btn" data-limit="1">Powder</button>
        <button class="room-btn" data-limit="1">Kitchen</button>
        <button class="room-btn" data-limit="1">Store</button>
        <button class="room-btn" data-limit="1">Work Area</button>
        <button class="room-btn" data-limit="1">Pantry</button>
        <button class="room-btn" data-limit="1">Walk-in Pantry</button>
        <button class="room-btn" data-limit="1">Butler's Pantry</button>
        <button class="room-btn" data-limit="1">Breakfast Nook</button>
        <button class="room-btn" data-limit="1">Hallway</button>
      </div>
      <div class="roomgroups">
        <button class="room-btn" data-limit="5">Bedroom</button>
        <button class="room-btn" data-limit="5">Bedroom+Dress</button>
        <button class="room-btn" data-limit="5">Bedroom+WIC</button>
        <button class="room-btn" data-limit="5">Bedroom+Bathroom</button>
        <button class="room-btn" data-limit="5">Bedroom+Ensuite</button>
        <button class="room-btn" data-limit="5">Bedroom+Dress+Bathroom</button>
        <button class="room-btn" data-limit="5">Bedroom+WIC+Ensuite</button>
      </div>
      <div class="roomgroups">
        <button class="room-btn" data-limit="1">Staircase</button>
        <button class="room-btn" data-limit="1">Verandah</button>
        <button class="room-btn" data-limit="1">Patio</button>
        <button class="room-btn" data-limit="1">Deck</button>
        <button class="room-btn" data-limit="1">Alfresco</button>
        <button class="room-btn" data-limit="1">Sunroom</button>
        <button class="room-btn" data-limit="1">Conservatory</button>
        <button class="room-btn" data-limit="1">Courtyard</button>
      </div>
      <div class="roomgroups">
        <button class="room-btn" data-limit="1">Home Theater</button>
        <button class="room-btn" data-limit="1">Media Room</button>
        <button class="room-btn" data-limit="1">Library</button>
        <button class="room-btn" data-limit="1">Gym</button>
        <button class="room-btn" data-limit="1">Game Room</button>
        <button class="room-btn" data-limit="1">Sauna</button>
        <button class="room-btn" data-limit="1">Steam Room</button>
        <button class="room-btn" data-limit="1">Shower Room</button>
      </div>
      <div class="roomgroups">
        <button class="room-btn" data-limit="1">Tea Room</button>
        <button class="room-btn" data-limit="1">Prayer Room</button>
        <button class="room-btn" data-limit="1">Puja</button>
        <button class="room-btn" data-limit="1">Laundry</button>
        <button class="room-btn" data-limit="1">Utility</button>
        <button class="room-btn" data-limit="1">Mudroom</button>
        <button class="room-btn" data-limit="1">Workshop</button>
      </div>
    </div>
  </div>
</div>

<div class="card-container">
  <div class="card" id="selection-card" style="min-height: 100px;">
    <div class="card-header">
      <div class="card-title">Selection</div>
      <div class="tooltip-container">
        <button id="reset-button" class="room-btn">Reset</button>
      </div>
    </div>
    <div id="selection-details"></div>
  </div>
</div>

<div class="button-container">
  <button id="btn1" class="common-btn">Click here to generate your floor plan</button>
</div>

<script>
const selectionDetails = document.getElementById("selection-details");
const roomClickCounts = {};
const roomClickLimits = {};
const roomButtons = document.querySelectorAll(".room-btn");

roomButtons.forEach(button => {
  const room = button.textContent.trim();
  const limit = parseInt(button.dataset.limit, 10);
  button.dataset.room = room;
  roomClickCounts[room] = 0;
  roomClickLimits[room] = limit;

  button.addEventListener("click", () => {
    if (roomClickCounts[room] >= limit) return;
    roomClickCounts[room]++;
    if (roomClickCounts[room] === limit) {
      button.style.color = "Gainsboro";
      button.style.backgroundColor = "white";
      button.style.borderColor = "white";
    }
    let selectedButton = [...selectionDetails.children].find(b => b.dataset.room === room);
    if (selectedButton) {
      selectedButton.textContent = `${room} (${roomClickCounts[room]})`;
    } else {
      const selected = document.createElement("button");
      selected.className = "sroom-btn";
      selected.dataset.room = room;
      selected.textContent = room;
      selectionDetails.appendChild(selected);
    }
  });
});

selectionDetails.addEventListener("click", e => {
  if (e.target.classList.contains("sroom-btn")) {
    const room = e.target.dataset.room;
    roomClickCounts[room]--;
    const originalButton = [...roomButtons].find(btn => btn.dataset.room === room);
    if (roomClickCounts[room] < roomClickLimits[room]) {
      originalButton.style = "";
    }
    if (roomClickCounts[room] > 1) {
      e.target.textContent = `${room} (${roomClickCounts[room]})`;
    } else if (roomClickCounts[room] === 1) {
      e.target.textContent = room;
    } else {
      e.target.remove();
    }
  }
});

document.getElementById("reset-button").addEventListener("click", () => {
  selectionDetails.innerHTML = "";
  Object.keys(roomClickCounts).forEach(r => roomClickCounts[r] = 0);
  roomButtons.forEach(btn => btn.style = "");
});

document.getElementById('title-link').addEventListener('click', e => {
  if (!confirm('Are you sure you want to leave the selection page?')) e.preventDefault();
});

const btn1 = document.getElementById('btn1');
btn1.addEventListener('click', async () => {
    btn1.classList.add('clicked');

    const selectedRooms = [...selectionDetails.children].map(btn => ({
        room: btn.dataset.room,
        count: roomClickCounts[btn.dataset.room]
    }));

    // Call your private Python backend on Render
    const response = await fetch('https://planetorabackend.onrender.com/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rooms: selectedRooms })
    });

    const result = await response.json();
    localStorage.setItem('selectedRooms', JSON.stringify(selectedRooms));
    localStorage.setItem('floorPlanData', JSON.stringify(result.floorPlan));

    setTimeout(() => window.location.href = 'page3.html', 200);
});
</script>

</body>
</html>
